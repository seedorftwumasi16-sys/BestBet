services:
  - type: web
    name: bestbet-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm run start:backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: bestbet-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://bestbet-nine.vercel.app
      - key: CORS_ORIGINS
        value: https://bestbet-nine.vercel.app
      - key: ADMIN_EMAIL
        value: admin@bestbet.gh
      - key: ADMIN_PASSWORD
        value: Admin@123
      - key: MOMO_NUMBER
        value: "0203907314"
      - key: MOMO_RECIPIENT_NAME
        value: RAHAMATU NUHU
      - key: UPLOAD_DIR
        value: ./uploads/deposits

databases:
  - name: bestbet-db
    plan: free
    databaseName: bestbet
    user: bestbet
